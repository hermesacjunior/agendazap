<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgendaZap</title>
  <meta name="description" content="AgendaZap - agendamento simples com notificacoes para seus clientes.">
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Arial, sans-serif;
      color: #12211b;
      background: #f7f8f5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(680px, 100%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(40px, 8vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 560px;
      margin: 0;
      color: #40524a;
      font-size: 20px;
      line-height: 1.5;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      color: #0d6b45;
      font-weight: 700;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #16a36a;
    }
  </style>
</head>
<body>
  <main>
    <div class="status"><span class="dot"></span>Site online</div>
    <h1>AgendaZap</h1>
    <p>Estamos preparando o acesso ao painel. Em breve voce podera gerenciar seus agendamentos por aqui.</p>
  </main>
</body>
</html>
