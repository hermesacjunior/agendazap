server {
    listen 80;
    server_name agendazapuap.com.br www.agendazapuap.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.agendazapuap.com.br$request_uri;
    }
}

server {
    listen 80;
    server_name api.agendazapuap.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.agendazapuap.com.br$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name agendazapuap.com.br;

    ssl_certificate /etc/letsencrypt/live/agendazapuap.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agendazapuap.com.br/privkey.pem;

    return 301 https://www.agendazapuap.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.agendazapuap.com.br;

    ssl_certificate /etc/letsencrypt/live/agendazapuap.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agendazapuap.com.br/privkey.pem;

    client_max_body_size 10m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location /static/ {
        alias /var/www/agendazap/current/agendazap/app/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

server {
    listen 443 ssl http2;
    server_name api.agendazapuap.com.br;

    ssl_certificate /etc/letsencrypt/live/agendazapuap.com.br/fullchain.pem;
