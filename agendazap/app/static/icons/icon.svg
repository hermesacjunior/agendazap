    <rect x="128" y="150" width="256" height="234" rx="34"/>
    <line x1="128" y1="214" x2="384" y2="214"/>
    <line x1="190" y1="128" x2="190" y2="172"/>
    <line x1="322" y1="128" x2="322" y2="172"/>
  </g>
