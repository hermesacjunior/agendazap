<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AgendaZap</title>
  <link rel="stylesheet" href="/static/css/main.css?v=4">
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg?v=2">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png?v=2">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">AZ</div>
      <span>AgendaZap</span>
    </div>

    <h2 style="font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 4px">Bem-vindo de volta</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 28px">Entre na sua conta</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    {% if google_enabled() %}
    <a href="/auth/google" class="btn btn-secondary btn-full btn-lg" style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:16px">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
        <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
      </svg>
      Continuar com Google
    </a>
    <div style="display:flex; align-items:center; gap:12px; margin:0 0 16px; color:var(--text-dim); font-size:13px">
      <span style="flex:1; height:1px; background:var(--border)"></span> ou <span style="flex:1; height:1px; background:var(--border)"></span>
    </div>
    {% endif %}

    <form method="POST" action="/auth/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="seu@email.com" required autofocus inputmode="email" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" placeholder="********" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 8px">
        Entrar
      </button>
    </form>

    <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted)">
      <a href="/auth/forgot-password">Esqueci minha senha</a>
    </p>

    <p style="text-align: center; margin-top: 12px; font-size: 14px; color: var(--text-muted)">
      Nao tem conta? <a href="/auth/register">Criar conta gratis</a>
    </p>
  </div>
</div>
</body>
</html>
