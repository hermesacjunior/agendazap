<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AgendaZap</title>
  <link rel="stylesheet" href="/static/css/main.css?v=4">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">AZ</div>
      <span>AgendaZap</span>
    </div>

    <h2 style="font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 4px">Bem-vindo de volta</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 28px">Entre na sua conta</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/auth/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="seu@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" placeholder="********" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 8px">
        Entrar
      </button>
    </form>

    <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted)">
      <a href="/auth/forgot-password">Esqueci minha senha</a>
    </p>

    <p style="text-align: center; margin-top: 12px; font-size: 14px; color: var(--text-muted)">
      Nao tem conta? <a href="/auth/register">Criar conta gratis</a>
    </p>
  </div>
</div>
</body>
</html>
