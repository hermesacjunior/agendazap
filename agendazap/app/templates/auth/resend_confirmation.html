<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reenviar confirmação - AgendaZap</title>
  <link rel="stylesheet" href="/static/css/main.css?v=4">
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg?v=2">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png?v=2">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/icons/icon.svg?v=2" alt="AgendaZap" width="40" height="40" style="border-radius:12px;display:block">
      <span>AgendaZap</span>
    </div>

    <h2 style="font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 4px">Reenviar confirmação</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 28px">Não recebeu o e-mail? Enviamos um novo link de confirmação.</p>

    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/resend-confirmation">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ email or '' }}" placeholder="seu@email.com" required autofocus inputmode="email" autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 8px">
        Reenviar e-mail
      </button>
    </form>

    <p style="text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-dim)">
      Verifique também as pastas <strong>Spam</strong> e <strong>Promoções</strong>.
    </p>
    <p style="text-align: center; margin-top: 12px; font-size: 14px; color: var(--text-muted)">
      <a href="/auth/login">Voltar para login</a>
    </p>
  </div>
</div>
</body>
</html>
