<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova senha - AgendaZap</title>
  <link rel="stylesheet" href="/static/css/main.css?v=4">
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg?v=2">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png?v=2">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">AZ</div>
      <span>AgendaZap</span>
    </div>

    <h2 style="font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 4px">Criar nova senha</h2>
    {% if email %}
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 28px">{{ email }}</p>
    {% else %}
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 28px">Informe uma nova senha</p>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if token %}
    <form method="POST" action="/auth/reset-password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" name="password" placeholder="Minimo 8 caracteres" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 8px">
        Atualizar senha
      </button>
    </form>
    {% endif %}

    <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted)">
      <a href="/auth/login">Voltar para login</a>
    </p>
  </div>
</div>
</body>
</html>
