<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — AgendaZap</title>
  <link rel="stylesheet" href="/static/css/main.css?v=4">
  <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg?v=2">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png?v=2">
  <meta name="apple-mobile-web-app-title" content="AgendaZap">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="/static/js/forms.js?v=1" defer></script>
  {% if captcha_enabled() %}
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  {% endif %}
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/icons/icon.svg?v=2" alt="AgendaZap" width="40" height="40" style="border-radius:12px;display:block">
      <span>AgendaZap</span>
    </div>

    <h2 style="font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 4px">Criar conta grátis</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 28px">Comece a receber agendamentos hoje</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" name="name" placeholder="Seu nome" required autofocus>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="seu@email.com" required inputmode="email" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>WhatsApp (opcional, com DDD)</label>
        <input type="tel" name="whatsapp" placeholder="(00) 00000-0000" inputmode="tel" autocomplete="tel" maxlength="16">
      </div>
      {% if captcha_enabled() %}
      <div class="g-recaptcha" data-sitekey="{{ captcha_site_key() }}" style="margin: 4px 0 8px"></div>
      {% endif %}
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 8px">
        Criar Conta Grátis
      </button>
    </form>

    <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted)">
      Já tem conta? <a href="/auth/login">Entrar</a>
    </p>
  </div>
</div>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}</script>
</body>
</html>
