<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — AgendaZap</title>
  <link rel="stylesheet" href="/static/css/main.css?v=4">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">📅</div>
      <span>AgendaZap</span>
    </div>

    <h2 style="font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 4px">Criar conta grátis</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 28px">Comece a receber agendamentos hoje</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" name="name" placeholder="Seu nome" required autofocus>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8">
      </div>
      <div class="form-group">
        <label>WhatsApp (opcional, com DDD)</label>
        <input type="text" name="whatsapp" placeholder="11999999999">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 8px">
        Criar Conta Grátis
      </button>
    </form>

    <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted)">
      Já tem conta? <a href="/auth/login">Entrar</a>
    </p>
  </div>
</div>
</body>
</html>
