<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha - AgendaZap</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">AZ</div>
      <span>AgendaZap</span>
    </div>

    <h2 style="font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 4px">Recuperar senha</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 28px">Informe o email cadastrado</p>

    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    {% if warning %}
    <div class="alert alert-error">{{ warning }}</div>
    {% endif %}

    <form method="POST" action="/auth/forgot-password">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="seu@email.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 8px">
        Enviar instrucoes
      </button>
    </form>

    <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted)">
      <a href="/auth/login">Voltar para login</a>
    </p>
  </div>
</div>
</body>
</html>
